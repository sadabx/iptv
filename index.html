<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IPTV — Watch live Bangladeshi TV channels. Free, fast, no login." />
  <title>IPTV - Live TV</title>
  <link rel="icon" type="image/png" href="iptv.png" />
  <link rel="apple-touch-icon" href="iptv.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <div class="logo">
      <img class="logo-mark" src="iptv.png" alt="IPTV logo" />
      <span class="logo-text">IPTV<span class="logo-blink">_</span></span>
    </div>

    <div class="sep"></div>

    <div class="now-playing">
      <span class="live-pill"><span class="live-dot"></span>LIVE</span>
      <span class="np-name">Now watching: <strong id="np-name">—</strong></span>
    </div>

    <div class="topbar-actions">
      <button class="bar-btn" id="btn-sidebar" title="Toggle channels" aria-label="Toggle channels">
        <svg width="15" height="12" viewBox="0 0 15 12" fill="currentColor">
          <rect width="15" height="1.5" rx=".75" />
          <rect y="5.25" width="10" height="1.5" rx=".75" />
          <rect y="10.5" width="15" height="1.5" rx=".75" />
        </svg>
      </button>
      <button class="bar-btn" id="btn-chat" title="Toggle chat" aria-label="Toggle chat">
        <svg width="15" height="14" viewBox="0 0 15 14" fill="currentColor">
          <path d="M13 0H2C.9 0 0 .9 0 2v8c0 1.1.9 2 2 2h2l2 2 2-2h5c1.1 0 2-.9 2-2V2c0-1.1-.9-2-2-2z" />
        </svg>
      </button>
    </div>
  </header>

  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
            <circle cx="5" cy="5" r="5" />
          </svg>
          Channels
        </span>
        <span class="channel-count" id="channel-count">—</span>
      </div>
      <div class="sidebar-search">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="5.5" cy="5.5" r="4.5" />
            <path d="M9 9l3 3" />
          </svg>
          <input id="search-input" class="search-input" type="search" placeholder="Search channels…"
            autocomplete="off" />
        </div>
      </div>
      <div class="ch-scroll" id="ch-list"></div>
      <div class="no-results" id="no-results">No channels found</div>
    </aside>

    <main class="stage">
      <video id="player" playsinline></video>

      <div class="state-overlay" id="overlay-loading">
        <div class="terminal-loader">
          <span class="tl-line">$ connecting to stream<span class="tl-cursor">▊</span></span>
        </div>
      </div>

      <div class="err-overlay" id="overlay-error">
        <span class="err-icon">📡</span>
        <span class="err-title">Stream unavailable</span>
        <span class="err-sub" id="err-sub">This channel may be offline or geo-restricted.</span>
        <button class="retry-btn" id="retry-btn">↺ Retry</button>
      </div>

      <div class="ctrl-bar">
        <button class="ctrl-btn" id="ctrl-play" title="Play / Pause"></button>

        <button class="ctrl-live-btn" id="ctrl-live" title="Jump to live">
          <span class="ctrl-live-dot"></span>LIVE
        </button>

        <div class="ctrl-spacer"></div>
        <span class="ctrl-channel-name" id="ctrl-ch-name"></span>
        <div class="ctrl-spacer"></div>

        <div class="vol-wrap">
          <button class="ctrl-btn" id="ctrl-mute" title="Mute / Unmute"></button>
          <input class="vol-slider" id="vol-slider" type="range" min="0" max="1" step="0.02" value="1" />
        </div>

        <button class="ctrl-btn" id="ctrl-fs" title="Fullscreen"></button>
      </div>
    </main>

    <aside class="chat" id="chat">
      <div class="chat-head">
        <span class="chat-title">Discord</span>
        <span class="chat-live">
          <span class="chat-live-dot"></span>
          IPTV server
        </span>
      </div>
      <div class="chat-body">
        <iframe src="https://e.widgetbot.io/channels/1514303287606775899/1514449895275237477" title="IPTV Discord chat"
          allow="clipboard-write; fullscreen"></iframe>
      </div>
    </aside>

  </div>

  <div class="toasts" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.11/dist/hls.min.js"></script>
  <script src="channels.js"></script>
  <script src="app.js"></script>

</body>

</html>
